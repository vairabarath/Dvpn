syntax = "proto3";

package dvpn;

option go_package = "github.com/vairabarath/Dvpn/super/pb";

service BaseNodeService {
    rpc RegisterSuperNode (RegisterRequest) returns (RegisterResponse);
    rpc SuperNodeHeartbeat (HeartbeatRequest) returns (Ack);
}

message RegisterRequest {
    string node_id = 1;           
    string region = 2;            
    string ip = 3;               
    string public_key = 4;        
    string signature = 5;         
    string nonce = 6;            
    int32 max_peers = 7;          
    string version = 8;           
    string startup_time = 9;      
}

message RegisterResponse {
    bool success = 1;
    string message = 2;
    string assigned_id = 3;
    string registered_at = 4;
}

message HeartbeatRequest {
    string node_id = 1;
    int32 active_peers = 2;
    int32 exit_peers_available = 3;
    float avg_latency_ms = 4;
    float bandwidth_usage_mbps = 5;
    string timestamp = 6;
}

message Ack {
    bool received = 1;
    string message = 2;
}
